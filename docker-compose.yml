services:
  mas-fid:
    build: .
    container_name: mas-fid
    ports:
      - "8000:8000"
    environment:
      MAS_DATA_DIR: /data
      MAS_MAX_FILES: "10"
      # Override if MAS changes the export endpoint:
      # MAS_FID_PRINT_URL: https://eservices.mas.gov.sg/fid/institution/print
    volumes:
      - mas_data:/data
    restart: unless-stopped

volumes:
  mas_data:
