services:
  mas-fid:
    # Use the pre-built image from GHCR…
    image: ghcr.io/zoubinho/mas-scrapper:main
    # …or build locally instead by commenting out `image:` above and using:
    # build: .
    container_name: mas-scrapper
    ports:
      - "5570:5570"
    environment:
      PORT: "5570"
      MAS_DATA_DIR: /data
      MAS_MAX_FILES: "10"
      # Fetch strategy: auto (HTTP then headless browser) | requests | playwright
      MAS_FETCH_METHOD: auto
      # Override if MAS changes the export endpoint:
      # MAS_FID_PRINT_URL: https://eservices.mas.gov.sg/fid/institution/print
    volumes:
      - mas_data:/data
    restart: unless-stopped

volumes:
  mas_data:
